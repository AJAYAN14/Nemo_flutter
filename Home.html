<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日语五十音图 - Flat Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 马卡龙配色体系 (Macaron Palette) */
        :root {
            --macaron-app-bg: #FFF9F9;     /* 极浅的樱花粉白 (App底色) */
            --macaron-body-bg: #E0F4FF;    /* 清新的薄荷蓝 (网页背景) */
            --macaron-header: #FFDDE2;     /* 草莓马卡龙粉 (头部背景) */
            --macaron-primary: #BDE0FE;    /* 晴空马卡龙蓝 (主按钮色) */
            --macaron-primary-active: #A2D2FF; /* 点击时的晴空蓝 */
            --macaron-accent: #FFAFCC;     /* 亮粉色 (标题强调线) */
            --macaron-text-main: #6B5B60;  /* 柔和深咖紫 (主文本，替代纯黑) */
            --macaron-text-sub: #A39398;   /* 柔和浅褐紫 (副文本) */
            --macaron-card: #FFFFFF;       /* 卡片纯白 */
            --macaron-card-hover: #FFF0F3; /* 卡片点击时的淡淡粉色 */
        }

        /* 全局基础样式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--macaron-body-bg); 
            font-family: 'Roboto', 'Noto Sans JP', sans-serif;
            padding: 20px;
        }

        /* iPhone 14 Pro Max 硬件外壳 (改为柔和白色系外壳) */
        .iphone-frame {
            width: 430px;
            height: 932px;
            background-color: #F8F9FA; 
            border-radius: 55px;
            padding: 12px;
            box-shadow: 0 20px 40px rgba(107, 91, 96, 0.15); /* 阴影也变得更柔和 */
            position: relative;
            flex-shrink: 0;
        }

        /* 手机屏幕区域 */
        .screen {
            width: 100%;
            height: 100%;
            background-color: var(--macaron-app-bg);
            border-radius: 44px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 2px solid #EAEAEA; /* 白色外壳与屏幕的分割线 */
        }

        /* 灵动岛 (Dynamic Island) */
        .dynamic-island {
            width: 120px;
            height: 35px;
            background-color: #000;
            border-radius: 20px;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        /* 底部 Home 提示条 */
        .home-indicator {
            width: 140px;
            height: 5px;
            background-color: var(--macaron-text-main);
            border-radius: 5px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            opacity: 0.15;
        }

        /* --- App 内部 UI 样式 (Macaron & Soft Rounded) --- */

        /* 顶部导航栏 - 马卡龙粉 */
        header {
            background-color: var(--macaron-header);
            padding: 60px 20px 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 2px solid #FFE8EC; /* 增加一点底边层次 */
        }

        header h1 {
            font-size: 20px;
            color: var(--macaron-text-main);
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 标签切换器 - 胶囊形状大圆角 */
        .tab-switch {
            display: flex;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 25px; /* 变更为大圆角胶囊 */
            overflow: hidden;
            padding: 4px; /* 增加内边距 */
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            border-radius: 20px; /* 内部按钮也是大圆角 */
            font-size: 15px;
            font-weight: 700;
            color: var(--macaron-text-sub);
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none; /* 去除点击时的默认轮廓线 */
            -webkit-tap-highlight-color: transparent; /* 去除移动端点击时的蓝色/灰色高亮背景 */
        }

        .tab-btn.active {
            background-color: var(--macaron-primary);
            color: var(--macaron-text-main);
            box-shadow: 0 4px 10px rgba(189, 224, 254, 0.5); /* 蓝色按钮的淡发光 */
        }

        /* 快速导航栏 (横向滑动) */
        .quick-nav {
            display: flex;
            overflow-x: auto;
            gap: 10px; /* 恢复统一的 gap 布局 */
            margin-top: 15px;
            padding-bottom: 5px;
            scrollbar-width: none;
            /* 抵消 header 的 padding，让滑动区域延伸到屏幕边缘 */
            width: calc(100% + 40px); /* 强制宽度覆盖整个屏幕 */
            margin-left: -20px;
            /* 保留左侧的 20px 初始对齐 */
            padding-left: 20px;
            -webkit-overflow-scrolling: touch; /* 提升 iOS 上的滚动顺滑度 */
        }
        
        .quick-nav::-webkit-scrollbar {
            display: none;
        }

        /* 终极防截断修复：使用伪元素强制在最右侧撑开空间 (完美兼容所有浏览器) */
        .quick-nav::after {
            content: '';
            flex: 0 0 10px; /* 结合 gap 的 10px，刚好补充 20px 的右侧安全边界 */
            width: 10px;
        }

        .quick-nav-btn {
            white-space: nowrap;
            padding: 8px 18px;
            background-color: rgba(255, 255, 255, 0.8);
            border: none;
            border-radius: 20px; /* 变更为圆润的药丸形 */
            font-size: 13px;
            color: var(--macaron-text-main);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0; /* 重要：防止按钮在空间不足时被挤压变形 */
            outline: none; /* 去除点击时自带的黑色焦点轮廓线 */
            -webkit-tap-highlight-color: transparent; /* 去除移动端点击高亮 */
        }

        .quick-nav-btn:active {
            background-color: var(--macaron-primary-active);
            transform: scale(0.95); /* 增加一点Q弹的按压感 */
        }

        /* 内容滚动区域 */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 40px;
            scrollbar-width: none;
        }
        .content-area::-webkit-scrollbar {
            display: none;
        }

        /* 分区标题 */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--macaron-text-main);
            margin: 28px 0 8px;
            display: flex;
            align-items: center;
            scroll-margin-top: 170px;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: var(--macaron-accent); /* 亮粉色点缀 */
            border-radius: 4px; /* 圆点点缀 */
            margin-right: 10px;
        }
        .section-title:first-child {
            margin-top: 0;
        }

        /* 分区副标题 */
        .section-subtitle {
            font-size: 13px;
            color: var(--macaron-text-sub);
            margin-bottom: 16px;
        }

        /* 网格布局 */
        .kana-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .yoon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .sokuon-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

        /* 假名卡片 - 大圆角，Q弹感 */
        .kana-card {
            background-color: var(--macaron-card);
            border-radius: 18px; /* 明显的大圆角 */
            padding: 14px 0;
            text-align: center;
            box-shadow: 0 4px 12px rgba(255, 175, 204, 0.15); /* 软糯的粉色微投影 */
            transition: background-color 0.15s, transform 0.1s;
        }
        .kana-card:active {
            background-color: var(--macaron-card-hover);
            transform: scale(0.94); /* 软糯的点击缩放反馈 */
        }

        /* 占位空卡片 - 完全透明 */
        .kana-card.empty {
            background-color: transparent;
            box-shadow: none;
            pointer-events: none;
        }

        .char {
            font-size: 24px;
            font-weight: 700;
            color: var(--macaron-text-main);
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .romaji {
            font-size: 12px;
            color: var(--macaron-text-sub);
            text-transform: lowercase;
            font-weight: 500;
        }

        /* 针对小屏幕设备的缩放适配 */
        @media (max-height: 950px) {
            .iphone-frame { transform: scale(0.85); }
        }
        @media (max-height: 800px) {
            .iphone-frame { transform: scale(0.7); }
        }
    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="screen">
            <div class="dynamic-island"></div>
            
            <header>
                <h1>五十音图</h1>
                <div class="tab-switch">
                    <button class="tab-btn active" id="tab-hiragana">平假名</button>
                    <button class="tab-btn" id="tab-katakana">片假名</button>
                </div>
                <div class="quick-nav">
                    <button class="quick-nav-btn" onclick="scrollToSection('sec-seion')">清音</button>
                    <button class="quick-nav-btn" onclick="scrollToSection('sec-dakuon')">浊音/半浊音</button>
                    <button class="quick-nav-btn" onclick="scrollToSection('sec-yoon')">拗音</button>
                    <button class="quick-nav-btn" onclick="scrollToSection('sec-sokuon')">促音</button>
                    <button class="quick-nav-btn" onclick="scrollToSection('sec-chouon')">长元音</button>
                </div>
            </header>

            <div class="content-area" id="content-area">
                <!-- 动态生成内容 -->
            </div>

            <div class="home-indicator"></div>
        </div>
    </div>

    <script>
        const kanaData = {
            seion: [
                ['あ', 'ア', 'a'],  ['い', 'イ', 'i'],   ['う', 'ウ', 'u'],   ['え', 'エ', 'e'],   ['お', 'オ', 'o'],
                ['か', 'カ', 'ka'], ['き', 'キ', 'ki'],  ['く', 'ク', 'ku'],  ['け', 'ケ', 'ke'],  ['こ', 'コ', 'ko'],
                ['さ', 'サ', 'sa'], ['し', 'シ', 'shi'], ['す', 'ス', 'su'],  ['せ', 'セ', 'se'],  ['そ', 'ソ', 'so'],
                ['た', 'タ', 'ta'], ['ち', 'チ', 'chi'], ['つ', 'ツ', 'tsu'], ['て', 'テ', 'te'],  ['と', 'ト', 'to'],
                ['な', 'ナ', 'na'], ['に', 'ニ', 'ni'],  ['ぬ', 'ヌ', 'nu'],  ['ね', 'ネ', 'ne'],  ['の', 'ノ', 'no'],
                ['は', 'ハ', 'ha'], ['ひ', 'ヒ', 'hi'],  ['ふ', 'フ', 'fu'],  ['へ', 'ヘ', 'he'],  ['ほ', 'ホ', 'ho'],
                ['ま', 'マ', 'ma'], ['み', 'ミ', 'mi'],  ['む', 'ム', 'mu'],  ['め', 'メ', 'me'],  ['も', 'モ', 'mo'],
                ['や', 'ヤ', 'ya'], null,               ['ゆ', 'ユ', 'yu'],  null,               ['よ', 'ヨ', 'yo'],
                ['ら', 'ラ', 'ra'], ['り', 'リ', 'ri'],  ['る', 'ル', 'ru'],  ['れ', 'レ', 're'],  ['ろ', 'ロ', 'ro'],
                ['わ', 'ワ', 'wa'], null,               null,               null,               ['を', 'ヲ', 'wo'],
                ['ん', 'ン', 'n'],  null,               null,               null,               null
            ],
            dakuon: [
                ['が', 'ガ', 'ga'], ['ぎ', 'ギ', 'gi'], ['ぐ', 'グ', 'gu'], ['げ', 'ゲ', 'ge'], ['ご', 'ゴ', 'go'],
                ['ざ', 'ザ', 'za'], ['じ', 'ジ', 'ji'], ['ず', 'ズ', 'zu'], ['ぜ', 'ゼ', 'ze'], ['ぞ', 'ゾ', 'zo'],
                ['だ', 'ダ', 'da'], ['ぢ', 'ヂ', 'ji'], ['づ', 'ヅ', 'zu'], ['で', 'デ', 'de'], ['ど', 'ド', 'do'],
                ['ば', 'バ', 'ba'], ['び', 'ビ', 'bi'], ['ぶ', 'ブ', 'bu'], ['べ', 'ベ', 'be'], ['ぼ', 'ボ', 'bo'],
                ['ぱ', 'パ', 'pa'], ['ぴ', 'ピ', 'pi'], ['ぷ', 'プ', 'pu'], ['ぺ', 'ペ', 'pe'], ['ぽ', 'ポ', 'po']
            ],
            yoon: [
                ['きゃ', 'キャ', 'kya'], ['きゅ', 'キュ', 'kyu'], ['きょ', 'キョ', 'kyo'],
                ['ぎゃ', 'ギャ', 'gya'], ['ぎゅ', 'ギュ', 'gyu'], ['ぎょ', 'ギョ', 'gyo'],
                ['しゃ', 'シャ', 'sha'], ['しゅ', 'シュ', 'shu'], ['しょ', 'ショ', 'sho'],
                ['じゃ', 'ジャ', 'ja'],  ['じゅ', 'ジュ', 'ju'],  ['じょ', 'ジョ', 'jo'],
                ['ちゃ', 'チャ', 'cha'], ['ちゅ', 'チュ', 'chu'], ['ちょ', 'チョ', 'cho'],
                ['にゃ', 'ニャ', 'nya'], ['にゅ', 'ニュ', 'nyu'], ['にょ', 'ニョ', 'nyo'],
                ['ひゃ', 'ヒャ', 'hya'], ['ひゅ', 'ヒュ', 'hyu'], ['ひょ', 'ヒョ', 'hyo'],
                ['びゃ', 'ビャ', 'bya'], ['びゅ', 'ビュ', 'byu'], ['びょ', 'ビョ', 'byo'],
                ['ぴゃ', 'ピャ', 'pya'], ['ぴゅ', 'ピュ', 'pyu'], ['ぴょ', 'ピョ', 'pyo'],
                ['みゃ', 'ミャ', 'mya'], ['みゅ', 'ミュ', 'myu'], ['みょ', 'ミョ', 'myo'],
                ['りゃ', 'リャ', 'rya'], ['りゅ', 'リュ', 'ryu'], ['りょ', 'リョ', 'ryo']
            ],
            sokuon: [
                ['っ+k', 'ッ+k', 'kk'], ['っ+s', 'ッ+s', 'ss'], ['っ+t', 'ッ+t', 'tt'], ['っ+p', 'ッ+p', 'pp']
            ],
            chouon: [
                ['ああ', 'アー', 'aa'], ['いい', 'イー', 'ii'], ['うう', 'ウー', 'uu'], ['ええ', 'エー', 'ee'], ['おお', 'オー', 'oo'],
                null,                  null,                  null,                  ['えい', null, 'ei'], ['おう', null, 'ou']
            ]
        };

        let currentType = 0; 
        
        const contentArea = document.getElementById('content-area');
        const tabHiragana = document.getElementById('tab-hiragana');
        const tabKatakana = document.getElementById('tab-katakana');

        function createCardsHTML(dataArray) {
            return dataArray.map(item => {
                if (item === null || item[currentType] === null) {
                    return `<div class="kana-card empty"></div>`;
                }
                const char = item[currentType];
                const romaji = item[2];
                const charStyle = char.length > 2 ? 'font-size: 18px;' : ''; 
                return `
                    <div class="kana-card">
                        <div class="char" style="${charStyle}">${char}</div>
                        <div class="romaji">${romaji}</div>
                    </div>
                `;
            }).join('');
        }

        function renderContent() {
            const isKatakana = currentType === 1;

            const html = `
                <div class="section-title" id="sec-seion">清音 (五十音)</div>
                <div class="kana-grid">
                    ${createCardsHTML(kanaData.seion)}
                </div>

                <div class="section-title" id="sec-dakuon">浊音和半浊音</div>
                <div class="section-subtitle">加上符号，发音就会改变</div>
                <div class="kana-grid">
                    ${createCardsHTML(kanaData.dakuon)}
                </div>

                <div class="section-title" id="sec-yoon">拗音</div>
                <div class="section-subtitle">加上小写假名，组成新的音节</div>
                <div class="yoon-grid">
                    ${createCardsHTML(kanaData.yoon)}
                </div>

                <div class="section-title" id="sec-sokuon">小写${isKatakana ? 'ッ' : 'っ'}</div>
                <div class="section-subtitle">双写辅音：后面的辅音要加倍发音</div>
                <div class="sokuon-grid">
                    ${createCardsHTML(kanaData.sokuon)}
                </div>

                <div class="section-title" id="sec-chouon">长元音</div>
                <div class="kana-grid">
                    ${createCardsHTML(kanaData.chouon)}
                </div>
            `;
            contentArea.innerHTML = html;
            contentArea.scrollTop = 0;
        }

        function scrollToSection(id) {
            const element = document.getElementById(id);
            if (element) {
                const topPos = element.offsetTop - 170; 
                contentArea.scrollTo({
                    top: topPos,
                    behavior: 'smooth'
                });
            }
        }

        tabHiragana.addEventListener('click', () => {
            currentType = 0;
            tabHiragana.classList.add('active');
            tabKatakana.classList.remove('active');
            renderContent();
        });

        tabKatakana.addEventListener('click', () => {
            currentType = 1;
            tabKatakana.classList.add('active');
            tabHiragana.classList.remove('active');
            renderContent();
        });

        renderContent();
    </script>
</body>
</html>
